name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests y validación
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar dependencias
        run: pip install -r requirements.txt onnxruntime

      - name: Verificar imports del paquete src
        run: |
          python -c "from src.config import SENTINEL_VALUE, NUMERIC_FEATURES"
          python -c "from src.data.preprocessing import RiskPreprocessor, SENTINEL_COLS, INFORMATIVE_NULL_COLS"
          python -c "from src.evaluation.metrics import regression_metrics, psi"
          python -c "from src.models.glm_model import GLMRiskModel"
          python -c "from src.models.ml_model import LGBMRiskModel"
          python -c "from src.api.app import app"
          python -c "from src.api.predictor import ModelPredictor"

      - name: Ejecutar tests unitarios
        run: pytest tests/ -v --tb=short -q

      - name: Lint (advertencias, no bloquea)
        run: |
          pip install flake8 --quiet
          python -m flake8 src/ --max-line-length=100 --ignore=E203,W503 --exit-zero
